name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /var/www/admin_frontend
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create deploy directory on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.SERVER_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
              "sudo mkdir -p $DEPLOY_PATH && sudo chown ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} $DEPLOY_PATH"

      - name: Upload build files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no" \
            dist/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Upload setup script
        run: |
          scp -i ~/.ssh/deploy_key \
              -P "${{ secrets.SERVER_PORT }}" \
              -o StrictHostKeyChecking=no \
              .github/scripts/setup-server.sh \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/setup-server.sh"

      - name: Run server setup
        run: |
          DOMAIN=$(echo "${{ secrets.APP_URL }}" | sed 's|https\?://||' | sed 's|[:/].*||')

          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.SERVER_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
              "chmod +x /tmp/setup-server.sh && sudo /tmp/setup-server.sh '${DOMAIN}' '${{ env.DEPLOY_PATH }}'"

      - name: Deployment complete
        run: echo "Deployed successfully to ${{ secrets.APP_URL }}"
